name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Cache both lockfiles so either change invalidates the cache
          cache-dependency-path: |
            csr-topology-editor/web-app/package-lock.json
            web-app-vue/package-lock.json

      # ── 1. Build Vue topology view ────────────────────────────────────
      # Output goes straight into the React app's public/ directory so Vite
      # will copy it into dist/ automatically during the React build below.
      - name: Install Vue dependencies
        run: npm ci
        working-directory: web-app-vue

      - name: Build Vue topology view
        run: |
          npx vite build \
            --base /BMC/vue-topo/ \
            --outDir ../csr-topology-editor/web-app/public/vue-topo \
            --emptyOutDir
        working-directory: web-app-vue

      # ── 2. Build React app (picks up public/vue-topo/ automatically) ──
      - name: Install React dependencies
        run: npm ci
        working-directory: csr-topology-editor/web-app

      - name: Build React app
        run: npm run build
        working-directory: csr-topology-editor/web-app

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: csr-topology-editor/web-app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
