<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boards · 3D Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <style>
    :root {
      --page-bg: #eef2f6;
      --canvas-bg: #f7f9fc;
      --panel-bg: rgba(255, 255, 255, 0.9);
      --panel-border: #d8e0e8;
      --panel-border-strong: #c7d3df;
      --text-primary: #111827;
      --text-secondary: #667085;
      --text-muted: #98a2b3;
      --accent: #2457d6;
      --accent-soft: #e8f0ff;
      --success-bg: #ecfdf3;
      --success-border: #b7e4c7;
      --success-text: #067647;
      --shadow-sm: 0 6px 16px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 14px 36px rgba(15, 23, 42, 0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      font-weight: 400;
      color: var(--text-primary);
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
      background: var(--page-bg);
    }

    svg {
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .app-shell {
      position: relative;
      width: 100%; height: 100vh;
      overflow: hidden;
    }

    .canvas-frame {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #three-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── overlay elements ─────────────────────────────── */
    .top-left-badge,
    .top-right-actions,
    .zoom-value-chip,
    .tool-dock,
    .inspector-panel {
      position: absolute;
      z-index: 2;
    }

    /* ── top-left badge ───────────────────────────────── */
    .top-left-badge {
      top: 16px; left: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      background: var(--panel-bg);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(14px);
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 32px; height: 32px;
      border-radius: 12px;
      background: #ffd84d;
      color: #111827;
      flex: none;
    }

    .brand-copy { display: grid; gap: 2px; }
    .brand-copy strong { font-size: 13px; font-weight: 700; }
    .brand-copy span { font-size: 11px; color: var(--text-secondary); }

    /* ── top-right ────────────────────────────────────── */
    .top-right-actions {
      top: 16px; right: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--success-border);
      background: var(--success-bg);
      color: var(--success-text);
      font-size: 12px;
      font-weight: 600;
    }

    .status-chip__dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success-text);
    }

    /* ── inspector panel ──────────────────────────────── */
    .inspector-panel {
      top: 74px; right: 18px;
      width: 260px;
      padding: 16px;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      background: var(--panel-bg);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(14px);
      display: grid;
      gap: 10px;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .inspector-panel.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px);
    }

    .panel-title {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 700;
    }

    .panel-divider {
      height: 1px;
      background: var(--panel-border);
      margin: 0;
    }

    .panel-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }

    .panel-row__label {
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
    }

    .panel-row__value {
      font-weight: 600;
      color: var(--text-primary);
      text-align: right;
      word-break: break-all;
    }

    /* ── zoom chip ────────────────────────────────────── */
    .zoom-value-chip {
      right: 18px; bottom: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      background: var(--panel-bg);
      box-shadow: var(--shadow-md);
      color: #344054;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(14px);
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease;
    }

    .zoom-value-chip:hover { transform: translateY(-1px); }

    /* ── tool dock ────────────────────────────────────── */
    .tool-dock {
      left: 50%; bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      background: var(--panel-bg);
      box-shadow: var(--shadow-md);
      transform: translateX(-50%);
      backdrop-filter: blur(14px);
    }

    .tool-button {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 40px; height: 40px;
      padding: 0;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      color: #475467;
      cursor: pointer;
      transition:
        transform 160ms ease,
        background-color 160ms ease,
        border-color 160ms ease,
        color 160ms ease,
        box-shadow 160ms ease;
    }

    .tool-button svg { width: 18px; height: 18px; }

    .tool-button:hover { transform: translateY(-1px); }

    .tool-button.is-active {
      background: var(--accent-soft);
      border-color: #c7d7fe;
      color: var(--accent);
    }

    .tool-tooltip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      padding: 6px 10px;
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 10px;
      background: rgba(17, 24, 39, 0.94);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.18);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      transform: translateX(-50%) translateY(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .tool-tooltip::after {
      content: "";
      position: absolute;
      top: 100%; left: 50%;
      width: 8px; height: 8px;
      background: rgba(17, 24, 39, 0.94);
      transform: translateX(-50%) rotate(45deg);
    }

    .tool-button:hover .tool-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--canvas-bg);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: opacity 400ms ease;
    }

    #loading.fade-out { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading">Loading model…</div>

  <div class="app-shell">
    <div class="canvas-frame">
      <canvas id="three-canvas"></canvas>

      <!-- top-left badge -->
      <header class="top-left-badge">
        <div class="brand-mark">
          <svg width="16" height="16" viewBox="0 0 16 16">
            <rect x="3" y="3" width="10" height="10" rx="2" stroke-width="1.6"/>
            <rect x="5.5" y="5.5" width="5" height="5" rx="1" stroke-width="1.4"/>
            <line x1="8" y1="1" x2="8" y2="3"/>
            <line x1="8" y1="13" x2="8" y2="15"/>
            <line x1="1" y1="8" x2="3" y2="8"/>
            <line x1="13" y1="8" x2="15" y2="8"/>
          </svg>
        </div>
        <div class="brand-copy">
          <strong>Boards</strong>
          <span>3D Viewer</span>
        </div>
      </header>

      <!-- top-right status -->
      <div class="top-right-actions">
        <div class="status-chip" id="status-chip">
          <div class="status-chip__dot"></div>
          <span id="status-text">Loading…</span>
        </div>
      </div>

      <!-- inspector panel -->
      <aside class="inspector-panel" id="inspector-panel">
        <p class="panel-title">Boards</p>
        <div class="panel-divider"></div>
        <div class="panel-row">
          <span class="panel-row__label">File</span>
          <span class="panel-row__value">boards.glb</span>
        </div>
        <div class="panel-row">
          <span class="panel-row__label">Size</span>
          <span class="panel-row__value" id="info-size">—</span>
        </div>
        <div class="panel-row">
          <span class="panel-row__label">Meshes</span>
          <span class="panel-row__value" id="info-meshes">—</span>
        </div>
        <div class="panel-row">
          <span class="panel-row__label">Materials</span>
          <span class="panel-row__value" id="info-materials">—</span>
        </div>
        <div class="panel-divider"></div>
        <div class="panel-row">
          <span class="panel-row__label">Zoom</span>
          <span class="panel-row__value" id="info-zoom">100%</span>
        </div>
      </aside>

      <!-- zoom chip -->
      <button class="zoom-value-chip" id="zoom-chip" title="Reset zoom">100%</button>

      <!-- tool dock -->
      <nav class="tool-dock">
        <button class="tool-button is-active" id="btn-view-25d" title="2.5D View">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path d="M9 2 L16 6 L16 12 L9 16 L2 12 L2 6 Z"/>
            <line x1="9" y1="2" x2="9" y2="16"/>
            <line x1="2" y1="6" x2="16" y2="6"/>
            <line x1="2" y1="12" x2="16" y2="12"/>
          </svg>
          <span class="tool-tooltip">2.5D View</span>
        </button>

        <button class="tool-button" id="btn-view-top" title="Top View">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <rect x="3" y="3" width="12" height="12" rx="1.5"/>
            <line x1="6" y1="6" x2="12" y2="6"/>
            <line x1="6" y1="9" x2="12" y2="9"/>
            <line x1="6" y1="12" x2="12" y2="12"/>
          </svg>
          <span class="tool-tooltip">Top View</span>
        </button>

        <button class="tool-button" id="btn-wire" title="Wireframe">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <rect x="3" y="3" width="12" height="12" rx="1.5"/>
            <line x1="3" y1="9" x2="15" y2="9"/>
            <line x1="9" y1="3" x2="9" y2="15"/>
            <line x1="3" y1="3" x2="15" y2="15"/>
            <line x1="15" y1="3" x2="3" y2="15"/>
          </svg>
          <span class="tool-tooltip">Wireframe</span>
        </button>

        <button class="tool-button" id="btn-reset" title="Reset zoom">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path d="M3 9a6 6 0 1 1 1.5 3.9"/>
            <polyline points="3,13 3,9 7,9"/>
          </svg>
          <span class="tool-tooltip">Reset Zoom</span>
        </button>

        <button class="tool-button is-active" id="btn-info" title="Inspector">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <circle cx="9" cy="9" r="7"/>
            <line x1="9" y1="8" x2="9" y2="13"/>
            <circle cx="9" cy="5.5" r="0.8" fill="currentColor" stroke="none"/>
          </svg>
          <span class="tool-tooltip">Inspector</span>
        </button>
      </nav>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
