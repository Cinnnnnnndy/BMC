<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSR 拓扑编辑器测试</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #1a1a2a;
      color: white;
      font-family: Arial, sans-serif;
    }
    .test-box {
      background: #252535;
      border: 1px solid #3a3a5a;
      border-radius: 8px;
      padding: 20px;
      margin: 20px;
    }
  </style>
</head>
<body>
  <div class="test-box">
    <h1>CSR 拓扑编辑器测试页面</h1>
    <p>如果您能看到这个页面，说明服务器工作正常</p>
    <button onclick="showAlert()">测试按钮</button>
  </div>
  
  <script>
    function showAlert() {
      alert('JavaScript 工作正常！');
    }
    
    console.log('测试页面加载成功');
  </script>

</html>
