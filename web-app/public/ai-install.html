<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 安装向导</title>
<style>
/* ═══ 全局深色滚动条约束 ═══ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.28); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.16) transparent; }

/* ═══ PTO design tokens ═══ */
:root {
  --bg:        #101010;
  --sf1:       #161616;
  --sf2:       #1c1c1c;
  --sf3:       #262626;
  --fg:        rgba(255,255,255,.90);
  --fg2:       rgba(255,255,255,.60);
  --fg3:       rgba(255,255,255,.40);
  --divider:   rgba(255,255,255,.06);
  --blue:      #0077FF;
  --blue-dim:  rgba(0,119,255,.14);
  --purple:    #a78bfa;
  --purple-dim:rgba(167,139,250,.14);
  --green:     #04d793;
  --red:       #ef4444;
  --yellow:    #f59e0b;
  --font:      'Inter','Source Han Sans SC','PingFang SC',sans-serif;
  --mono:      'JetBrains Mono','Fira Code','Consolas',monospace;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--fg); font-family:var(--font); font-size:13px; line-height:1.6; }

.layout { display:flex; height:100vh; overflow:hidden; }

/* ── Step Rail ─────────────────────────────────── */
.rail {
  width:190px; flex-shrink:0;
  background:var(--sf1);
  display:flex; flex-direction:column; padding:0;
}
.rail-head {
  padding:16px 16px 10px;
  font-size:11px; font-weight:600; color:var(--fg3);
  text-transform:uppercase; letter-spacing:.06em;
}
.rail-steps { padding:4px 0; display:flex; flex-direction:column; gap:0; }

.s-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 16px; cursor:default;
  position:relative;
}
.s-item::before {
  content:'';
  position:absolute; left:26px; top:32px; width:1.5px; height:16px;
  background:var(--divider);
}
.s-item:last-child::before { display:none; }

.s-num {
  width:22px; height:22px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
  color:var(--fg3); background:var(--sf3);
  transition:all .25s; position:relative; z-index:1;
}
.s-label { font-size:12.5px; color:var(--fg3); transition:color .2s; }

.s-item.active  .s-num  { background:var(--blue); color:#fff; }
.s-item.active  .s-label { color:var(--fg); font-weight:500; }
.s-item.done    .s-num  { background:rgba(4,215,147,.14); color:var(--green); }
.s-item.done    .s-label { color:var(--fg2); }
.s-item.done::before { background:var(--green); opacity:.35; }

.rail-footer {
  margin-top:auto; padding:14px 16px;
  font-size:11.5px; color:var(--fg3); line-height:1.5;
}

/* ── Chat Main ────────────────────────────────── */
.chat-main { flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }

.chat-head {
  height:44px; flex-shrink:0;
  display:flex; align-items:center; padding:0 16px; gap:8px;
  background:var(--sf1);
}
.ch-avatar {
  width:28px; height:28px; border-radius:50%;
  background:var(--purple-dim); color:var(--purple);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.ch-avatar svg { display:block; }
.ch-name { font-size:13px; font-weight:600; }
.ch-badge { font-size:10px; font-weight:600; padding:1px 7px; border-radius:100px; background:var(--purple-dim); color:var(--purple); letter-spacing:.04em; }
.ch-status { margin-left:auto; font-size:11.5px; color:var(--fg3); }

.messages { flex:1; overflow-y:auto; padding:20px 20px 12px; display:flex; flex-direction:column; gap:14px; }

/* ── Message Rows ────────────────────────────── */
.row { display:flex; gap:10px; align-items:flex-start; }

.av {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; margin-top:1px;
  background:var(--sf3);
}
.av-ai   { color:var(--purple); }
.av-user { color:var(--green); }

.body-wrap { flex:1; min-width:0; }
.msg-name { font-size:11.5px; font-weight:600; color:var(--fg3); margin-bottom:4px; }

.bubble {
  display:inline-block; max-width:100%;
  background:var(--sf2);
  border-radius:0 10px 10px 10px; padding:10px 13px;
  font-size:13px; line-height:1.65; color:var(--fg); word-break:break-word;
}
.bubble p+p { margin-top:6px; }
.bubble strong { color:var(--fg); }
.bubble code { font-family:var(--mono); font-size:11.5px; background:rgba(0,0,0,.3); padding:1px 5px; border-radius:3px; color:#86d9fa; }

/* 用户消息右对齐 */
.row.user { flex-direction:row-reverse; }
.row.user .body-wrap { display:flex; flex-direction:column; align-items:flex-end; }
.row.user .bubble { background:var(--blue-dim); border-radius:10px 0 10px 10px; }

/* Thinking */
.thinking { display:flex; align-items:center; gap:3px; padding:8px 12px; background:var(--sf2); border-radius:0 10px 10px 10px; width:fit-content; }
.td { width:6px; height:6px; border-radius:50%; background:var(--fg3); animation:tp 1.2s ease-in-out infinite; }
.td:nth-child(2) { animation-delay:.2s; }
.td:nth-child(3) { animation-delay:.4s; }
@keyframes tp { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

/* Actions */
.actions { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
.abtn {
  height:30px; padding:0 16px; border-radius:100px;
  border:none; background:var(--sf3);
  color:var(--fg2); font-size:12.5px; font-family:inherit; cursor:pointer;
  transition:background .12s, color .12s;
}
.abtn:hover { background:rgba(255,255,255,.14); color:var(--fg); }
.abtn.primary { background:var(--blue); color:#fff; }
.abtn.primary:hover { background:rgba(50,145,254,1); }
.abtn:disabled { opacity:.35; cursor:default; pointer-events:none; }

/* Check list */
.checks { margin-top:10px; background:var(--sf3); border-radius:10px; padding:8px 12px; }
.chk { display:flex; align-items:center; gap:9px; padding:5px 0; border-bottom:1px solid var(--divider); font-size:12.5px; }
.chk:last-child { border-bottom:none; }
.chk-icon { flex-shrink:0; width:18px; text-align:center; font-size:13px; }
.chk-label { flex:1; }
.chk-note { font-size:11.5px; color:var(--fg3); }

/* Terminal */
.term {
  margin-top:10px;
  background:#060609;
  border-radius:10px; padding:10px 13px;
  font-family:var(--mono); font-size:11.5px; line-height:1.75;
  color:rgba(255,255,255,.60); max-height:220px; overflow-y:auto;
}
.tc  { color:#86d9fa; }
.tc::before { content:'$ '; color:rgba(255,255,255,.25); }
.tok { color:var(--green); }
.ter { color:var(--red); }
.twa { color:var(--yellow); }
.tdm { color:rgba(255,255,255,.35); }
.term-note { margin-top:6px; font-size:11px; color:var(--fg3); }

/* Chat input bar */
.input-bar {
  flex-shrink:0;
  padding:10px 16px; display:flex; gap:8px; align-items:center;
  background:var(--sf1);
}
.ibar-field {
  flex:1; height:36px; padding:0 14px; border-radius:100px;
  border:none; background:var(--sf2);
  color:var(--fg); font-size:13px; font-family:inherit; outline:none;
}
.ibar-field:focus { background:var(--sf3); }
.ibar-send {
  width:36px; height:36px; border-radius:50%; border:none;
  background:var(--blue); color:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .12s;
}
.ibar-send:hover { background:rgba(50,145,254,1); }
.ibar-send svg { width:16px; height:16px; fill:currentColor; }

/* Done overlay */
.done-overlay {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(16,16,16,.92); z-index:100;
  opacity:0; pointer-events:none; transition:opacity .4s;
}
.done-overlay.show { opacity:1; pointer-events:all; }
.done-icon { font-size:56px; margin-bottom:14px; animation:pop .4s ease-out; }
.done-title { font-size:20px; font-weight:700; margin-bottom:6px; }
.done-sub { font-size:13px; color:var(--fg2); margin-bottom:20px; }
@keyframes pop { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
</style>
</head>
<body>
<div class="layout">
  <!-- Step Rail -->
  <aside class="rail">
    <div class="rail-head">安装向导</div>
    <div class="rail-steps">
      <div class="s-item active" id="si1">
        <div class="s-num" id="sn1">1</div>
        <div class="s-label">登录官网</div>
      </div>
      <div class="s-item" id="si2">
        <div class="s-num" id="sn2">2</div>
        <div class="s-label">环境准备</div>
      </div>
      <div class="s-item" id="si3">
        <div class="s-num" id="sn3">3</div>
        <div class="s-label">选择开发机型</div>
      </div>
    </div>
    <div class="rail-footer">AI 全程引导，关键步骤确认后自动执行</div>
  </aside>

  <!-- Chat -->
  <main class="chat-main">
    <div class="chat-head">
      <div class="ch-avatar">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 2l1.9 6.1L20 10l-6.1 1.9L12 18l-1.9-6.1L4 10l6.1-1.9z"/></svg>
      </div>
      <span class="ch-name">安装助手</span>
      <span class="ch-badge">AI</span>
      <span class="ch-status" id="ch-status">待机中</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar" style="display:none">
      <input class="ibar-field" id="ibar-field" placeholder="输入消息，按 Enter 发送…" />
      <button class="ibar-send" id="ibar-send">
        <svg viewBox="0 0 24 24"><path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/></svg>
      </button>
    </div>
  </main>
</div>

<!-- Done overlay -->
<div class="done-overlay" id="done-overlay">
  <div class="done-icon">✅</div>
  <div class="done-title">安装部署完成！</div>
  <div class="done-sub" id="done-sub">正在打开开发视图…</div>
  <button class="abtn primary" onclick="document.getElementById('done-overlay').classList.remove('show')">进入开发环境</button>
</div>

<script>
const msgs   = document.getElementById('messages');
const status = document.getElementById('ch-status');

function toParent(msg) {
  try { window.parent.postMessage(msg, '*'); } catch(_) {}
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function scrollEnd() { msgs.scrollTop = msgs.scrollHeight; }
function setStatus(t) { status.textContent = t; }

function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    const si = document.getElementById('si' + i);
    const sn = document.getElementById('sn' + i);
    si.classList.remove('active','done');
    if (i < n) { si.classList.add('done'); sn.textContent = '✓'; }
    if (i === n) { si.classList.add('active'); }
  }
}

let thinkRow = null;
function showThinking() {
  thinkRow = document.createElement('div');
  thinkRow.className = 'row';
  thinkRow.innerHTML =
    `<div class="av av-ai">
       <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 2l1.9 6.1L20 10l-6.1 1.9L12 18l-1.9-6.1L4 10l6.1-1.9z"/></svg>
     </div>
     <div class="body-wrap">
       <div class="thinking"><div class="td"></div><div class="td"></div><div class="td"></div></div>
     </div>`;
  msgs.appendChild(thinkRow);
  scrollEnd();
}
function hideThinking() {
  if (thinkRow) { thinkRow.remove(); thinkRow = null; }
}

async function aiMsg(html, { delay = 700, actions = [] } = {}) {
  showThinking();
  setStatus('正在思考…');
  await sleep(delay);
  hideThinking();
  setStatus('待机中');

  const row = document.createElement('div');
  row.className = 'row ai';
  let actHtml = '';
  if (actions.length) {
    actHtml = `<div class="actions">${actions.map(a =>
      `<button class="abtn${a.primary?' primary':''}" data-act="${a.act}">${a.label}</button>`
    ).join('')}</div>`;
  }
  row.innerHTML =
    `<div class="av av-ai">
       <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 2l1.9 6.1L20 10l-6.1 1.9L12 18l-1.9-6.1L4 10l6.1-1.9z"/></svg>
     </div>
     <div class="body-wrap">
       <div class="msg-name">安装助手</div>
       <div class="bubble">${html}</div>
       ${actHtml}
     </div>`;
  msgs.appendChild(row);
  scrollEnd();
  return row;
}

function userMsg(text) {
  const row = document.createElement('div');
  row.className = 'row user';
  row.innerHTML =
    `<div class="av av-user">我</div>
     <div class="body-wrap">
       <div class="msg-name">你</div>
       <div class="bubble">${text}</div>
     </div>`;
  msgs.appendChild(row);
  scrollEnd();
  return row;
}

function disableActions(row) {
  row.querySelectorAll('.abtn').forEach(b => b.disabled = true);
}

async function termBlock(bubble, lines) {
  const block = document.createElement('div');
  block.className = 'term';
  bubble.appendChild(block);
  scrollEnd();
  for (const ln of lines) {
    await sleep(ln.d ?? 250);
    const div = document.createElement('div');
    div.className = ln.c ?? '';
    div.textContent = ln.t;
    block.appendChild(div);
    scrollEnd();
  }
  return block;
}

function runCmd(cmd) {
  toParent({ type: 'ai-run-agent', cmd });
}
// 在向导旁的分屏内打开外部页面（登录 / GitCode 密钥），不跳出浏览器
function openWeb(viewId) {
  toParent({ type: 'ai-open-web', viewId });
}
function termNote(bubble) {
  const n = document.createElement('div');
  n.className = 'term-note';
  n.textContent = '⤷ 完整执行过程见底部 agent 终端';
  bubble.appendChild(n);
}

// ── Step 1: 登录官网 ──────────────────────────────────────────────────

async function step1Welcome() {
  const row = await aiMsg(
    `<p>你好！我是 openUBMC <strong>安装助手</strong>，将带你完成开发环境的全部配置。</p>
     <p>共三步：登录官网 → 环境准备 → 选择开发机型。</p>
     <p style="margin-top:8px">首先——你有 openUBMC 开发者账号了吗？</p>`,
    {
      delay: 900,
      actions: [
        { act: 'has-acct',  label: '已有账号' },
        { act: 'need-acct', label: '还没有账号' },
      ]
    }
  );
  row.addEventListener('click', e => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    disableActions(row);
    if (btn.dataset.act === 'has-acct') {
      userMsg('已有账号');
      step1Login();
    } else {
      userMsg('还没有账号');
      step1Register();
    }
  });
}

async function step1Register() {
  const row = await aiMsg(
    `<p>好，点下方按钮，我在左侧分屏打开 openUBMC 注册页——注册并登录后我会自动检测登录状态并继续。</p>`,
    { actions: [ { act: 'open-reg', label: '前往注册 openUBMC 账号', primary: true } ] }
  );
  row.addEventListener('click', e => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    disableActions(row);
    userMsg('前往注册');
    openWeb('openubmcLogin');
    step1DetectLogin();
  });
}

async function step1Login() {
  const row = await aiMsg(
    `<p>好，点下方按钮，我在左侧分屏打开 openUBMC 登录页——登录成功后会自动检测并进入下一步，无需手动确认。</p>`,
    { actions: [ { act: 'open-login', label: '前往登录 openUBMC 账号', primary: true } ] }
  );
  row.addEventListener('click', e => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    disableActions(row);
    userMsg('前往登录');
    openWeb('openubmcLogin');
    step1DetectLogin();
  });
}

// 登录状态自动检测（模拟 setup 登录态探测）→ 成功后自动进入下一步，无需点击
async function step1DetectLogin() {
  const row = await aiMsg('<p>已在左侧分屏打开登录页，正在自动检测登录状态…</p>', { delay: 500 });
  const bubble = row.querySelector('.bubble');
  await termBlock(bubble, [
    { t: '检测 openUBMC 登录状态…', c: 'tdm', d: 1500 },
    { t: '✓ 已登录（账号会话有效）', c: 'tok', d: 600 },
  ]);
  await sleep(300);
  step2LinuxEnv();
}

// ── Step 2: 环境准备 ──────────────────────────────────────────────────

async function step2LinuxEnv() {
  setStep(2);
  const row = await aiMsg(
    `<p>登录成功 ✓</p>
     <p>openUBMC 的编译构建需要在 <strong>Linux 环境</strong>中进行。你目前有可用的 Linux 环境吗？</p>`,
    {
      delay: 600,
      actions: [
        { act: 'has-linux', label: '有，已可以 SSH 连接', primary: true },
        { act: 'need-wsl',  label: '没有，需要安装 WSL' },
      ]
    }
  );
  row.addEventListener('click', e => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    disableActions(row);
    if (btn.dataset.act === 'has-linux') {
      userMsg('有，已可以 SSH 连接');
      step2GitCode();
    } else {
      userMsg('没有，需要安装 WSL');
      step2InstallWSL();
    }
  });
}

async function step2InstallWSL() {
  const row = await aiMsg(
    `<p>没问题，WSL 安装命令我直接推到下方 agent 终端运行，装好后会自动带你继续，无需手动确认。</p>`,
    { delay: 800 }
  );
  const bubble = row.querySelector('.bubble');

  // 直接打开底部 agent 终端并运行 WSL 安装引导
  runCmd('agent 安装 wsl 子系统');

  await termBlock(bubble, [
    { t: 'setup_check_platform', c: 'tc', d: 300 },
    { t: '  检测到 Windows 主机，未安装 WSL', c: 'tdm', d: 700 },
    { t: '  ① wsl --install -d Ubuntu-22.04（WSL2 内核 + Ubuntu-22.04，装好重启）', c: 'tdm', d: 900 },
    { t: '  ② 重启后设置 Linux 用户名/密码 → sudo apt update && upgrade -y', c: 'tdm', d: 900 },
    { t: '  ③ VS Code 装 Remote-WSL，左下角 >< → Connect to WSL', c: 'tdm', d: 800 },
    { t: '  ✓ WSL2 · Ubuntu-22.04 就绪', c: 'tok', d: 700 },
  ]);
  termNote(bubble);

  await sleep(600);
  step2GitCode();
}

async function step2GitCode() {
  const row = await aiMsg(
    `<p>下面配置 <strong>GitCode SSH 密钥</strong>，用于拉取代码仓。点下方按钮我在左侧分屏打开 GitCode 密钥设置页；公钥会在终端取出，添加后我自动检测并继续。</p>
     <div class="checks">
       <div class="chk"><span class="chk-icon">①</span>
         <span class="chk-label">终端运行 <code>cat ~/.ssh/id_rsa.pub</code> 复制公钥</span></div>
       <div class="chk"><span class="chk-icon">②</span>
         <span class="chk-label">GitCode 个人设置 → SSH 密钥 → 添加公钥</span></div>
     </div>`,
    { actions: [ { act: 'open-git', label: '打开 GitCode 密钥设置', primary: true } ] }
  );
  row.addEventListener('click', e => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    disableActions(row);
    userMsg('打开 GitCode 密钥设置');
    openWeb('gitcodeKeys');
    step2DetectKey();
  });
}

// SSH 公钥自动检测 → 成功后自动进入部署，无需点击
async function step2DetectKey() {
  const row = await aiMsg('<p>已在左侧分屏打开 GitCode 密钥设置页，正在自动检测 SSH 公钥…</p>', { delay: 500 });
  const bubble = row.querySelector('.bubble');
  await termBlock(bubble, [
    { t: 'cat ~/.ssh/id_rsa.pub', c: 'tc', d: 400 },
    { t: '  ssh-ed25519 AAAAC3Nz…dev@openubmc', c: 'tdm', d: 700 },
    { t: '  检测 GitCode SSH 公钥…', c: 'tdm', d: 1200 },

// ── Step 3: 选择开发机型 ──────────────────────────────────────────────

async function step3ModelSelect() {
  setStep(3);
  const row = await aiMsg(
    `<p>环境准备配置检测通过 ✓</p>
     <p>最后一步——选择开发机型。选好后我直接加载对应机型配置并打开硬件适配视图，之后可在 IDE 右下角状态栏随时切换。</p>`,
    {
      delay: 700,
      actions: [
        { act: 'taishan', label: '华为 TaiShan 200 2180（均衡型）', primary: true },
        { act: 'tianchi', label: '华为 天池 TianChi' },
        { act: 'ref',     label: 'openUBMC 社区参考机型' },
      ]
    }
  );
  const MODELS = {
    taishan: '华为 TaiShan 200 2180（均衡型）',
    tianchi: '华为 天池 TianChi',
    ref:     'openUBMC 社区参考机型',
  };
  row.addEventListener('click', e => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    disableActions(row);
    const name = MODELS[btn.dataset.act];
    userMsg('选择机型：' + name);
    step3ApplyModel(name);
  });
}

// 机型配置在流程内完成 → 配置就绪后再打开硬件适配视图
async function step3ApplyModel(name) {
  const row = await aiMsg('<p>正在加载机型配置：<strong>' + name + '</strong>…</p>', { delay: 400 });
  const bubble = row.querySelector('.bubble');
  await termBlock(bubble, [
    { t: 'setup_check_platform', c: 'tc', d: 300 },
    { t: '  载入机型配置 ' + name, c: 'tdm', d: 900 },
    { t: '  ✓ 机型配置就绪，开发辅助已启用', c: 'tok', d: 600 },
  ]);

  const si3 = document.getElementById('si3');
  const sn3 = document.getElementById('sn3');
  si3.classList.remove('active');
  si3.classList.add('done');
  sn3.textContent = '✓';

  await aiMsg('<p>机型「' + name + '」配置完成 ✓ 正在打开硬件适配视图…</p>', { delay: 400 });
  await sleep(700);
  document.getElementById('done-sub').textContent = '正在打开硬件适配视图…';
  document.getElementById('done-overlay').classList.add('show');
  await sleep(800);
  toParent({ type: 'ai-open-scenario', viewId: 'vueTopo' });
}

// ── Start ──────────────────────────────────────────────────────────────
(async () => {
  await sleep(500);
  step1Welcome();
})();
</script>
