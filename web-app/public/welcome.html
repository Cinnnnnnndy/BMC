<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎使用 openUBMC Studio</title>
  <link rel="stylesheet" href="./welcome/welcome.css">
  <style>
/* ═══ 全局深色滚动条约束（design constraint — 禁止默认白底滚动条）═══
   任何新页面/新样式文件必须包含本段全局规则，不得只写局部选择器版本 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.28); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.16) transparent; }

    :root {
      --new-badge-image: url('./welcome/assets/new.png');
      --red-dot-image: url('./welcome/assets/red.svg');
    }

    /* ═══ Agent 工作台 ═══ */
    .agent-workbench {
      background: #111113;
      border-radius: 16px;
      padding: 18px;
      margin-top: 20px;
    }
    .aw-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .aw-header .title {
      font-size: 16px;
      color: #8D98AA;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .aw-header .title svg { color: #4F46E5; }
    .aw-mcp-note {
      font-size: 11px;
      color: rgba(232,232,237,0.35);
      white-space: nowrap;
    }
    .aw-body {
      display: flex;
      gap: 16px;
      align-items: stretch;
    }
    .aw-main {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .aw-input-row {
      display: flex;
      gap: 8px;
    }
    .aw-input {
      flex: 1;
      height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: #e8e8ed;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .aw-input::placeholder { color: rgba(232,232,237,0.30); }
    .aw-input:focus { border-color: #4F46E5; }
    .aw-send {
      height: 38px;
      padding: 0 18px;
      border-radius: 10px;
      border: none;
      background: #4F46E5;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .aw-send:hover { background: #6159ef; }
    .aw-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .aw-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: transparent;
      color: rgba(232,232,237,0.65);
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .aw-chip:hover {
      color: #e8e8ed;
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.05);
    }
    .aw-chip.accent {
      border-color: rgba(79,70,229,0.45);
      color: #a5b4fc;
    }
    .aw-chip.accent:hover {
      border-color: #4F46E5;
      background: rgba(79,70,229,0.12);
    }
    .aw-status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 6px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 12px;
      color: rgba(232,232,237,0.5);
    }
    .aw-status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: rgba(232,232,237,0.25);
    }
    .aw-status.running .dot {
      background: #4F46E5;
      animation: aw-pulse 1s ease-in-out infinite;
    }
    .aw-status.done .dot { background: #35C81D; }
    .aw-status .aw-status-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @keyframes aw-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .aw-recent {
      flex: 0 0 240px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }
    .aw-recent-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(232,232,237,0.45);
      letter-spacing: .03em;
    }
    .aw-recent-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .aw-recent-item:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.10);
    }
    .aw-recent-name {
      font-size: 12px;
      color: rgba(232,232,237,0.75);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .aw-recent-time {
      font-size: 11px;
      color: rgba(232,232,237,0.30);
    }
    .aw-recent-empty {
      font-size: 12px;
      color: rgba(232,232,237,0.28);
      padding: 8px 10px;
    }
    @media (max-width: 720px) {
      .aw-body { flex-direction: column; }
      .aw-recent { flex: none; }
    }
  </style>
</head>
<body>
  <!-- URI storage for JS -->
  <div id="uri-storage" style="display: none;"
    data-recent-file-1="./welcome/assets/recentFile-1.svg"
    data-recent-file-2="./welcome/assets/recentFile-2.svg"
    data-alphabet-base-uri="./welcome/alphabet">
  </div>

  <div class="welcome-container">
    <!-- 顶部区域 -->
    <div class="top-section-wrapper">
      <!-- 品牌展示 -->
      <div class="header-section" style="background-image: url('./welcome/assets/background_big.png'); background-size: cover; background-position: center;">
        <div class="brand-info">
          <div class="brand-text-top">
            <p class="version">version:2.0.3</p>
          </div>
          <img class="brand-icon" src="./welcome/assets/icon.svg" alt="openUBMC Studio">
        </div>
        <div class="header-right">
          <div class="role-dropdown" id="role-dropdown">
            <button class="role-badge" id="role-switch-btn" title="切换角色">
              <span class="role-badge-text">我是<span id="current-role">--</span></span>
              <svg class="role-badge-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="role-dropdown-menu" id="role-dropdown-menu">
              <div class="role-dropdown-item" data-role="machine_developer">整机开发者</div>
              <div class="role-dropdown-item" data-role="component_developer">部件开发者</div>
            </div>
          </div>
          <div class="action-buttons">
            <button class="btn btn-secondary" id="openProject">导入工程</button>
            <button class="btn btn-primary" id="newProject">新建工程</button>
          </div>
        </div>
      </div>

      <!-- 工作流程 -->
      <div class="workflow-section">
        <div class="workflow-header">
          <h2 class="title">GET STARTED</h2>
        </div>
        <div class="workflow-items" id="workflowItems"></div>
      </div>
    </div>

    <!-- Agent 工作台 -->
    <div class="agent-workbench">
      <div class="aw-header">
        <h2 class="title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
          </svg>
          AGENT 工作台
        </h2>
        <span class="aw-mcp-note">已接入 7 个 MCP Server · 26 个工具</span>
      </div>
      <div class="aw-body">
        <div class="aw-main">
          <div class="aw-input-row">
            <input class="aw-input" id="aw-input" type="text"
                   placeholder="让 agent 帮你完成任务，如：巡检在线 BMC / 给 CPU0 加过温事件 / 校验当前 CSR…">
            <button class="aw-send" id="aw-send">派发任务</button>
          </div>
          <div class="aw-chips" id="aw-chips">
            <button class="aw-chip accent" data-view="installGuide">✦ AI 引导安装部署</button>
            <button class="aw-chip" data-cmd="agent 诊断安装环境">环境诊断</button>
            <button class="aw-chip" data-cmd="agent 巡检在线 BMC">BMC 巡检</button>
            <button class="aw-chip" data-cmd="agent 校验当前 CSR">CSR 校验</button>
            <button class="aw-chip" data-cmd="agent 给 CPU0 加过温事件">过温事件配置</button>
            <button class="aw-chip" data-cmd="agent 注入风扇故障">风扇故障注入</button>
            <button class="aw-chip" data-cmd="agent 计算 smc 偏移">SMC 偏移编码</button>
          </div>
          <div class="aw-status" id="aw-status">
            <span class="dot"></span>
            <span class="aw-status-text">暂无运行中的 agent 任务 — 点击上方快捷任务或输入指令开始</span>
          </div>
        </div>
        <div class="aw-recent">
          <div class="aw-recent-title">最近 agent 对话</div>
          <div id="aw-recent-list"></div>
        </div>
      </div>
    </div>

    <!-- 消息提示 -->
    <div class="message-bar">
      <div class="message-bar-content">
        <div class="message-bar-left">
          <img src="./welcome/assets/publicNotice.svg">
          <span class="message-text">
            <span class="text-content">openUBMC Studio 2.0.3版本已发布</span>
            <span class="flower-group">
              <span class="flower"></span>
              <span class="flower"></span>
              <span class="flower"></span>
            </span>
          </span>
        </div>
        <a class="update-link" id="updateBtn">检查更新</a>
      </div>
      <button class="btn-close" id="closeBtn">
        <img src="./welcome/assets/publicClose.svg">
      </button>
    </div>

    <!-- 底部区域 -->
    <div class="footer-section">
      <div class="recent-section">
        <h4 class="title">最近打开</h4>
        <ul class="recent-list" id="recentList">
          <li class="recent-item" data-path="">
            <div class="recent-item-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 16v-4"/>
                <path d="M12 8h.01"/>
              </svg>
            </div>
            <div class="recent-item-content">
              <div class="recent-item-name">暂无最近打开的文件</div>
            </div>
          </li>
        </ul>
      </div>
      <div class="docs-section">
        <h4 class="title">社区文档&工具引导</h4>
        <div class="docs-grid">
          <div class="doc-item" data-url="https://www.openubmc.cn/zh">
            <img src="./welcome/assets/ubmc.svg" alt="社区官网" class="doc-icon">
            <span>社区官网</span>
          </div>
          <div class="doc-item" data-url="https://www.openubmc.cn/docs/zh/development/quick_start/explore_openubmc.html">
            <img src="./welcome/assets/quickStart.svg" alt="快速入门" class="doc-icon">
            <span>快速入门</span>
          </div>
          <div class="doc-item" data-url="https://www.openubmc.cn/zh/marketplace">
            <img src="./welcome/assets/appStore.svg" alt="应用市场" class="doc-icon">
            <span>应用市场</span>
          </div>
          <div class="doc-item" data-url="https://www.openubmc.cn/zh/docs">
            <img src="./welcome/assets/documentation.svg" alt="文档中心" class="doc-icon">
            <span>文档中心</span>
          </div>
          <div class="doc-item" data-url="https://www.openubmc.cn/docs/zh/development/tool_guide/bmc_studio_tool.html">
            <img src="./welcome/assets/toolGuide.svg" alt="工具指南" class="doc-icon">
            <span>工具指南</span>
          </div>
          <div class="doc-item" data-url="https://discuss.openubmc.cn/">
            <img src="./welcome/assets/feedback.svg" alt="问题反馈" class="doc-icon">
            <span>问题反馈</span>
          </div>
          <div class="doc-item" id="setupWizardTrigger" data-action="openSetupWizard">
            <img src="./welcome/assets/tutorial.svg" alt="初始配置引导" class="doc-icon">
            <span>初始配置引导</span>
          </div>
          <div class="doc-item" data-url="./release-notes.html">
            <img src="./welcome/assets/newFeature.svg" alt="新功能介绍" class="doc-icon">
            <span>新功能介绍</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="role-selector-container"></div>
  <div id="wizard-container"></div>

  <script src="./welcome/vscode-stub.js"></script>
  <script src="./welcome/welcome.js"></script>
  <script>
    window.addEventListener('load', function () {
      // Actual workflow data from machine-workflow-data.json
      var workflowData = {
        "steps": [
          {
            "id": "env",
            "name": "环境部署",
            "color": "#35C81D",
            "details": [
              { "id": "plugin-installation", "name": "插件安装", "status": "released" },
              { "id": "resource-download", "name": "资源下载", "status": "released" },
              { "id": "component-repo-management", "name": "组件仓管理", "status": "unreleased" }
            ]
          },
          {
            "id": "dev",
            "name": "开发",
            "color": "#D5CB1C",
            "details": [
              { "id": "hardware-adaptation", "name": "硬件适配", "status": "released" },
              { "id": "resource-tree", "name": "资源协作接口", "status": "released" },
              { "id": "component-customization", "name": "组件定制", "status": "unreleased" }
            ]
          },
          {
            "id": "debug",
            "name": "调试",
            "color": "#7575FF",
            "details": [
              { "id": "hardware-simulation", "name": "硬件仿真", "status": "unreleased" },
              { "id": "northbound-interface-test", "name": "北向接口测试", "status": "unreleased" },
              { "id": "online-debug", "name": "在线调试", "status": "unreleased" }
            ]
          },
          {
            "id": "build",
            "name": "构建",
            "color": "#33D7EA",
            "details": [
              { "id": "component-build", "name": "组件构建", "status": "unreleased" },
              { "id": "product-build", "name": "产品构建", "status": "unreleased" },
              { "id": "part-build", "name": "部件构建", "status": "unreleased" }
            ]
          },
          {
            "id": "test",
            "name": "测试",
            "color": "#DFA404",
            "details": [
              { "id": "test-platform", "name": "测试平台", "status": "unreleased" },
              { "id": "local-test", "name": "本地测试", "status": "unreleased" }
            ]
          },
          {
            "id": "release",
            "name": "发布",
            "color": "#EC6311",
            "details": [
              { "id": "publish-component", "name": "发布组件", "status": "released" },
              { "id": "community-contribution", "name": "社区贡献", "status": "released" },
              { "id": "publish-product", "name": "发布产品", "status": "unreleased" }
            ]
          }
        ]
      };

      // Trigger workflow rendering (command field, workflow key)
      window.dispatchEvent(new MessageEvent('message', {
        data: { command: 'updateWorkflow', workflow: workflowData }
      }));

      // Set role display (type field, not command)
      window.dispatchEvent(new MessageEvent('message', {
        data: { type: 'updateRole', role: 'machine_developer', roleName: '整机开发者' }
      }));
    });
  </script>
  <script>
    /* ═══ Agent 工作台 ═══ */
    (function () {
      function toParent(msg) {
        try { window.parent.postMessage(msg, '*'); } catch (_) {}
      }
      function runAgent(cmd) {
        toParent({ type: 'ai-run-agent', cmd: cmd });
      }
      function openView(viewId) {
        toParent({ type: 'ai-open-scenario', viewId: viewId });
      }

      // ── 派发：自由输入 + 快捷任务 ──
      var input = document.getElementById('aw-input');
      var send = document.getElementById('aw-send');
      function dispatchInput() {
        var v = (input.value || '').trim();
        if (!v) return;
        runAgent(/^(agent|open|mcp|help|views)\b/.test(v) ? v : 'agent ' + v);
        input.value = '';
      }
      send.addEventListener('click', dispatchInput);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); dispatchInput(); }
      });
      document.getElementById('aw-chips').addEventListener('click', function (e) {
        var chip = e.target.closest('.aw-chip');
        if (!chip) return;
        if (chip.dataset.view) openView(chip.dataset.view);
        else if (chip.dataset.cmd) runAgent(chip.dataset.cmd);
      });

      // ── 任务状态（localStorage: bmcAgentTaskStatus，AgentTerminal 写入）──
      var statusEl = document.getElementById('aw-status');
      function fmtAgo(ts) {
        var d = Date.now() - ts;
        if (d < 60e3) return '刚刚';
        if (d < 3600e3) return Math.floor(d / 60e3) + ' 分钟前';
        if (d < 86400e3) return Math.floor(d / 3600e3) + ' 小时前';
        return Math.floor(d / 86400e3) + ' 天前';
      }
      function renderStatus() {
        var st = null;
        try { st = JSON.parse(localStorage.getItem('bmcAgentTaskStatus')); } catch (_) {}
        statusEl.classList.remove('running', 'done');
        var text = statusEl.querySelector('.aw-status-text');
        if (!st) {
          text.textContent = '暂无运行中的 agent 任务 — 点击上方快捷任务或输入指令开始';
        } else if (st.state === 'running') {
          statusEl.classList.add('running');
          text.textContent = '正在执行：' + st.title + '…';
        } else if (st.state === 'done') {
          statusEl.classList.add('done');
          text.textContent = '上次任务：' + st.title + ' ✔（' + fmtAgo(st.finishedAt) + '）' + (st.summary ? ' — ' + st.summary : '');
        }
      }
      renderStatus();
      window.addEventListener('storage', function (e) {
        if (e.key === 'bmcAgentTaskStatus') renderStatus();
      });
      setInterval(renderStatus, 3000); // storage 事件兜底（同文档写入不触发事件）

      // ── 最近 agent 对话（localStorage: bmcAiChatSessions，ai-assist 写入）──
      var recentList = document.getElementById('aw-recent-list');
      function renderRecent() {
        var sessions = [];
        try { sessions = JSON.parse(localStorage.getItem('bmcAiChatSessions')) || []; } catch (_) {}
        recentList.innerHTML = '';
        if (!sessions.length) {
          var empty = document.createElement('div');
          empty.className = 'aw-recent-empty';
          empty.textContent = '暂无对话记录，试试右侧 AI 助手';
          recentList.appendChild(empty);
          return;
        }
        sessions.slice(0, 4).forEach(function (ss) {
          var item = document.createElement('div');
          item.className = 'aw-recent-item';
          var firstUser = (ss.messages || []).find(function (m) { return m.role === 'user'; });
          var name = document.createElement('div');
          name.className = 'aw-recent-name';
          name.textContent = ss.title || (firstUser ? firstUser.text : '(空会话)');
          var time = document.createElement('div');
          time.className = 'aw-recent-time';
          time.textContent = fmtAgo(ss.time || Date.now());
          item.appendChild(name);
          item.appendChild(time);
          item.addEventListener('click', function () { openView('aiHistory'); });
          recentList.appendChild(item);
        });
      }
      renderRecent();
      window.addEventListener('storage', function (e) {
        if (e.key === 'bmcAiChatSessions') renderRecent();
      });
    })();
  </script>
</body>
</html>
