<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎使用 openUBMC Studio</title>
  <link rel="stylesheet" href="./welcome/welcome.css">
  <style>
/* ═══ 全局深色滚动条约束（design constraint — 禁止默认白底滚动条）═══
   任何新页面/新样式文件必须包含本段全局规则，不得只写局部选择器版本 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.28); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.16) transparent; }

    :root {
      --new-badge-image: url('./welcome/assets/new.png');
      --red-dot-image: url('./welcome/assets/red.svg');
    }

    /* ═══ Agent 工作台 ═══
       样式约束（与 CLAUDE.md「欢迎系页面视觉规范」一致）：
       - 卡片 #111113 / radius 16px，靠填充色分层，禁止 1px 描边框线
       - 面型（fill）图标优先；AI/agent 统一 ✦ 四角星 #a78bfa（同 ai-assist）
       - 主按钮 #0077FF 胶囊（radius 100px），同欢迎页「新建工程」
       - 空状态用演示数据兜底，不留空白区 */
    .agent-workbench {
      background: #111113;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 28px;
    }
    .aw-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .aw-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 0.3px;
    }
    .aw-title svg { color: #a78bfa; display: block; }
    /* MCP 能力面板（左侧主体：体现已接入的 MCP Server / 工具） */
    .aw-mcp { margin-top: 2px; }
    .aw-mcp-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.40);
      letter-spacing: .03em;
      margin-bottom: 8px;
    }
    .aw-mcp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 8px;
    }
    /* 场景能力卡：点击直接派发到 agent 运行（背后是对应 MCP Server 的工具） */
    .aw-cap {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 9px 12px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background 0.15s;
    }
    .aw-cap:hover { background: rgba(255,255,255,0.12); }
    .aw-cap-name { font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,0.90); }
    .aw-cap-meta { font-size: 10.5px; color: #a78bfa; }
    .aw-body {
      display: flex;
      gap: 20px;
      align-items: stretch;
    }
    .aw-main {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .aw-input-row {
      display: flex;
      gap: 8px;
    }
    .aw-input {
      flex: 1;
      height: 36px;
      padding: 0 16px;
      border-radius: 100px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.90);
      font-size: 13px;
      outline: none;
      transition: background 0.15s;
    }
    .aw-input::placeholder { color: rgba(255,255,255,0.35); }
    .aw-input:focus { background: rgba(255,255,255,0.10); }
    .aw-send {
      height: 36px;
      padding: 0 20px;
      border-radius: 100px;
      border: none;
      background: rgba(0, 119, 255, 1);
      color: #FFFFFE;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .aw-send:hover { background: rgba(50, 145, 254, 1); }
    .aw-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .aw-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      padding: 0 14px;
      border-radius: 100px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.70);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .aw-chip svg { display: block; }
    .aw-chip:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.95);
    }
    .aw-chip.accent {
      background: rgba(167,139,250,0.14);
      color: #a78bfa;
    }
    .aw-chip.accent:hover {
      background: rgba(167,139,250,0.24);
      color: #c4b5fd;
    }
    @keyframes aw-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .aw-recent {
      flex: 0 0 264px;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .aw-recent-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.40);
      letter-spacing: .03em;
      padding: 0 8px 8px;
    }
    .aw-recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .aw-recent-item:hover { background: rgba(255,255,255,0.07); }
    /* 任务状态灯：不再用图标，仅用颜色点表示状态；细节走 hover title */
    .aw-recent-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: 3px;
      background: rgba(255,255,255,0.28);
    }
    .aw-recent-dot.done    { background: #04d793; box-shadow: 0 0 0 3px rgba(4,215,147,0.14); }
    .aw-recent-dot.running { background: #0077ff; box-shadow: 0 0 0 3px rgba(0,119,255,0.16); animation: aw-pulse 1s ease-in-out infinite; }
    .aw-recent-dot.failed  { background: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.16); }
    .aw-recent-main { flex: 1 1 auto; min-width: 0; }
    .aw-recent-name {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .aw-recent-time {
      font-size: 11px;
      color: rgba(255,255,255,0.32);
      margin-top: 1px;
    }
    @media (max-width: 720px) {
      .aw-body { flex-direction: column; }
      .aw-recent { flex: none; }
    }
  </style>
</head>

  <script>
    /* ═══ Agent 工作台 ═══ */
    (function () {
      function toParent(msg) {
        try { window.parent.postMessage(msg, '*'); } catch (_) {}
      }
      function runAgent(cmd) {
        toParent({ type: 'ai-run-agent', cmd: cmd });
      }
      function openView(viewId) {
        toParent({ type: 'ai-open-scenario', viewId: viewId });
      }

      // ── 派发：自由输入 + 快捷任务 ──
      var input = document.getElementById('aw-input');
      var send = document.getElementById('aw-send');
      function dispatchInput() {
        var v = (input.value || '').trim();
        if (!v) return;
        runAgent(/^(agent|open|mcp|help|views)\b/.test(v) ? v : 'agent ' + v);
        input.value = '';
      }
      send.addEventListener('click', dispatchInput);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); dispatchInput(); }
      });
      document.getElementById('aw-chips').addEventListener('click', function (e) {
        var chip = e.target.closest('.aw-chip');
        if (!chip) return;
        if (chip.dataset.view) openView(chip.dataset.view);
        else if (chip.dataset.cmd) runAgent(chip.dataset.cmd);
      });
      // MCP 能力（按场景）：点击直接派发到 agent 终端运行
      document.getElementById('aw-mcp-grid').addEventListener('click', function (e) {
        var cap = e.target.closest('.aw-cap');
        if (!cap || !cap.dataset.cmd) return;
        runAgent(cap.dataset.cmd);
      });

      // ── 最近 agent 对话（localStorage: bmcAiChatSessions，ai-assist 写入）──
      //    任务状态不再单列：每条对话前的图标状态点即状态（绿=完成/蓝=进行中/黄=未通过），
      //    细节只在 hover 时以 tooltip 显示；运行中的任务（bmcAgentTaskStatus）置顶。
      function fmtAgo(ts) {
        var d = Date.now() - ts;
        if (d < 60e3) return '刚刚';
        if (d < 3600e3) return Math.floor(d / 60e3) + ' 分钟前';
        if (d < 86400e3) return Math.floor(d / 3600e3) + ' 小时前';
        return Math.floor(d / 86400e3) + ' 天前';
      }
      var STATE_LABEL = { running: '进行中', done: '已完成', failed: '未通过' };
      // 演示数据兜底（状态点 + hover 细节；列表本身只显示标题与时间）
      var DEMO_SESSIONS = [
        { title: '开发环境诊断与修复（安装引导）', timeText: '今天 09:40', state: 'done',
          detail: '环境准备 6/6 项通过，检测结果已回写安装引导「配置检测」' },
        { title: 'BMC 批量巡检（命令宏）', timeText: '昨天 14:32', state: 'done',
          detail: '在线 3 / 离线 1（node-4 · 22 端口不可达），结果已同步面板' },
        { title: 'CPU0 过温事件配置', timeText: '3 天前', state: 'done',
          detail: 'csr_validate 通过（0 errors），已写入 CSR' },
        { title: '风扇故障注入（数字孪生）', timeText: '2 周前', state: 'done',
          detail: 'FAN3 rpm 8000 → 1200，关联 PWM 总线已高亮，转速仪表转红' }
      ];
      var recentList = document.getElementById('aw-recent-list');
      function mkRecentItem(r) {
        var state = r.state || 'done';
        var item = document.createElement('div');
        item.className = 'aw-recent-item';
        // hover 显示任务状态 + 细节
        item.title = (STATE_LABEL[state] || '') + (r.detail ? ' · ' + r.detail : '');
        var dot = document.createElement('span');
        dot.className = 'aw-recent-dot ' + state;
        var main = document.createElement('div');
        main.className = 'aw-recent-main';
        var name = document.createElement('div');
        name.className = 'aw-recent-name';
        name.textContent = r.title;
        var time = document.createElement('div');
        time.className = 'aw-recent-time';
        time.textContent = r.timeText;
        main.appendChild(name);
        main.appendChild(time);
        item.appendChild(dot);
        item.appendChild(main);
        item.addEventListener('click', function () { openView('aiHistory'); });
        return item;
      }
      function renderRecent() {
        var sessions = [];
        try { sessions = JSON.parse(localStorage.getItem('bmcAiChatSessions')) || []; } catch (_) {}
        var rows = sessions.slice(0, 4).map(function (ss) {
          var firstUser = (ss.messages || []).find(function (m) { return m.role === 'user'; });
          return {
            title: ss.title || (firstUser ? firstUser.text : '(空会话)'),
            timeText: fmtAgo(ss.time || Date.now()),
            state: ss.state || 'done',
            detail: ss.summary || (firstUser ? firstUser.text : '')
          };
        });
        // 不足 4 条时用示例场景补齐（演示数据兜底）
        for (var i = 0; rows.length < 4 && i < DEMO_SESSIONS.length; i++) rows.push(DEMO_SESSIONS[i]);
        rows = rows.slice(0, 4);
        // 有运行中的任务时置顶，实时反映状态
        var live = null;
        try { live = JSON.parse(localStorage.getItem('bmcAgentTaskStatus')); } catch (_) {}
        if (live && live.state === 'running') {
          rows.unshift({ title: live.title, timeText: '进行中', state: 'running', detail: '正在执行…' });
          rows = rows.slice(0, 4);
        }
        recentList.innerHTML = '';
        rows.forEach(function (r) { recentList.appendChild(mkRecentItem(r)); });
      }
      renderRecent();
      window.addEventListener('storage', function (e) {
        if (e.key === 'bmcAiChatSessions' || e.key === 'bmcAgentTaskStatus') renderRecent();
      });
      setInterval(renderRecent, 4000); // 刷新相对时间 + 运行态兜底
    })();
  </script>
</body>
</html>
