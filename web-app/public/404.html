<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>openUBMC Studio</title>
  <script>
    // GitHub Pages project-site fallback: send any unmatched path back to the
    // app root (/<repo>/) so a refresh or deep link never dead-ends on 404.
    (function () {
      var seg = location.pathname.split('/').filter(Boolean);
      var base = seg.length ? '/' + seg[0] + '/' : '/';
      location.replace(location.origin + base);
    })();
  </script>
</head>
<body></body>
</html>
