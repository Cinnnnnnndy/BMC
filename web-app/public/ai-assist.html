<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 助手</title>
<style>
/* ═══ 全局深色滚动条约束（design constraint — 禁止默认白底滚动条）═══
   任何新页面/新样式文件必须包含本段全局规则，不得只写局部选择器版本 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.28); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.16) transparent; }

:root {
  --background: #101010;
  --surface-1: #161616;
  --surface-2: #1c1c1c;
  --surface-3: #262626;
  --foreground: rgba(255,255,255,.90);
  --foreground-secondary: rgba(255,255,255,.60);
  --foreground-muted: rgba(255,255,255,.40);
  --border-default: rgba(255,255,255,.10);
  --border-subtle: rgba(255,255,255,.06);
  --primary: #4369ef;
  --success: #04d793;
  --state-selected: rgba(67,105,239,.14);
  --state-hover: rgba(255,255,255,.06);
  --accent-purple: #a78bfa;
  --font-sans: 'Inter','Source Han Sans SC','PingFang SC',sans-serif;
  --font-mono: 'JetBrains Mono','Fira Code','Consolas',monospace;

  --bg-base: var(--background);
  --bg-panel2: var(--surface-1);
  --bg-hover: var(--surface-2);
  --bg-active: var(--surface-3);
  --bg-selected: var(--state-selected);
  --text-primary: var(--foreground);
  --text-secondary: var(--foreground-secondary);
  --text-muted: var(--foreground-muted);
  --border: var(--border-default);
  --accent-blue: var(--primary);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg-panel2);
  color: var(--foreground);
  font-family: var(--font-sans);
  font-size: 13px;
  overflow: hidden;
}

.panel {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  height: 42px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-subtle);
}
.ph-icon { font-size: 14px; line-height: 1; display: inline-flex; align-items: center; }
.hist-icon svg, .tool-chip svg, .ph-icon svg { display: block; }
.ph-title { font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1 1 auto; }
.badge-beta {
  font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 10px;
  background: color-mix(in srgb, var(--accent-purple) 18%, transparent);
  color: var(--accent-purple);
  letter-spacing: .04em;
}
.ph-act-btn {
  padding: 2px 10px; background: transparent; border: none;
  border-radius: 4px; color: var(--text-secondary);
  font-size: 11px; font-family: inherit; cursor: pointer; transition: .15s;
}
.ph-act-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.ph-act-btn.is-active { background: var(--bg-selected); color: var(--accent-blue); }

.panel-body {
  flex: 1 1 0; min-height: 0; display: flex; flex-direction: column; overflow: hidden;
}

.chat-view { flex: 1 1 0; min-height: 0; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

.scenario-banner {
  display: flex; align-items: center; gap: 8px;
  margin: 10px 12px 0; padding: 7px 10px;
  border: 1px solid color-mix(in srgb, var(--accent-blue) 35%, transparent);
  background: var(--bg-selected);
  border-radius: 8px; flex-shrink: 0;
  font-size: 11.5px; color: var(--text-secondary);
}
.scenario-banner b { color: var(--text-primary); font-weight: 600; }
.scenario-banner button {
  margin-left: auto; flex-shrink: 0;
  padding: 3px 10px; border: none; border-radius: 6px;
  background: var(--accent-blue); color: #fff;
  font-size: 11px; font-family: inherit; cursor: pointer; transition: .15s;
}
.scenario-banner button:hover { background: #5a92e6; }

.chat-messages {
  flex: 1 1 0; min-height: 0;
  overflow-y: auto; padding: 14px 12px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 9px; }

.chat-msg { display: flex; gap: 10px; align-items: flex-start; }
.chat-msg.user { flex-direction: row-reverse; }

.cm-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--bg-active);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--accent-blue); flex-shrink: 0;
}
.chat-msg.user .cm-avatar { color: var(--success); }

.cm-bubble {
  max-width: 85%; padding: 9px 12px;
  border-radius: 0 10px 10px 10px;
  font-size: 13px; line-height: 1.65;
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
}
.chat-msg.user .cm-bubble {
  background: var(--accent-blue);
  border-color: transparent;
  color: #fff;
  border-radius: 10px 10px 0 10px;
}
.cm-bubble code {
  background: var(--bg-base); padding: 1px 4px; border-radius: 3px;
  font-size: 11px; color: var(--accent-blue); font-family: var(--font-mono);
}
.cm-bubble pre {
  margin: 6px 0; padding: 8px 10px;
  background: var(--bg-base); border: 1px solid var(--border-subtle);
  border-radius: 6px; overflow-x: auto;
  font-size: 11px; line-height: 1.6;
  font-family: var(--font-mono); color: var(--text-secondary);
  white-space: pre;
}

.tool-calls { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.tool-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-family: var(--font-mono);
  padding: 2px 7px; border-radius: 9px;
  background: color-mix(in srgb, var(--success) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--success) 25%, transparent);
  color: var(--success);
  white-space: nowrap;
}

.sys-note {
  align-self: center;
  font-size: 10.5px; color: var(--text-muted);
  padding: 3px 12px; border-radius: 10px;
  background: var(--bg-hover);
}

.suggestions {
  padding: 4px 12px 10px;
  display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
}
.sug-btn {
  font-size: 11px; height: 24px; padding: 0 10px; border-radius: 12px;
  border: 1px solid var(--border-default);
  background: var(--bg-hover); color: var(--text-secondary);
  cursor: pointer; font-family: inherit; white-space: nowrap; transition: .15s;
}
.sug-btn:hover { background: var(--bg-active); color: var(--text-primary); }

.chat-input-area {
  display: flex; gap: 8px;
  padding: 8px 12px 12px;
  flex-shrink: 0;
  border-top: 1px solid var(--border-subtle);
}
.chat-input {
  flex: 1 1 0; background: var(--bg-base);
  border: 1px solid var(--border-default);
  border-radius: 10px; padding: 8px 12px;
  color: var(--text-primary); font-size: 13px; font-family: inherit;
  resize: none; height: 52px; line-height: 1.5; outline: none; transition: border-color .15s;
}
.chat-input:focus { border-color: var(--accent-blue); }
.chat-send {
  width: 36px; height: 52px;
  background: var(--accent-blue); border: none; border-radius: 10px;
  color: #fff; font-size: 16px; cursor: pointer; transition: background .15s; flex-shrink: 0;
}
.chat-send:hover { background: #5a92e6; }
.chat-send:disabled { background: var(--bg-active); color: var(--text-muted); cursor: default; }

.typing-dots { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-muted);
  animation: typing-bounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes typing-bounce {
  0%,60%,100% { transform: translateY(0); opacity: .4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ── History view ─────────────────────────────────────── */
.history-view {
  flex: 1 1 0; min-height: 0;
  overflow-y: auto; padding: 12px;
  display: none; flex-direction: column; gap: 6px;
}
.history-view::-webkit-scrollbar { width: 5px; }
.history-view::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 9px; }
/* 历史与聊天左右并排（同一卡片内），互不覆盖 */
body.show-history .panel-body { flex-direction: row; }
body.show-history .history-view {
  display: flex;
  flex: 0 0 200px;
  border-right: 1px solid var(--border-subtle);
}

/* history-tab-mode: opened as a full pane tab via ?view=history */
body.history-tab-mode #history-btn,
body.history-tab-mode #new-chat-btn,
body.history-tab-mode .badge-beta { display: none; }
body.history-tab-mode .history-view { padding: 16px 20px; }
body.history-tab-mode .hist-item { background: var(--bg-active); }

.hv-section-title {
  font-size: 10.5px; font-weight: 600; letter-spacing: .06em;
  color: var(--text-muted); text-transform: uppercase;
  padding: 8px 2px 4px;
}
.hist-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 9px 10px; border-radius: 8px;
  border: 1px solid var(--border-subtle);
  background: var(--surface-2);
  cursor: pointer; transition: .15s;
}
.hist-item:hover { background: var(--bg-active); border-color: var(--border-default); }
.hist-icon {
  width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
  background: var(--bg-base); border: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.hist-main { flex: 1 1 auto; min-width: 0; }
.hist-title {
  font-size: 12.5px; font-weight: 600; color: var(--text-primary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.hist-preview {
  font-size: 11px; color: var(--text-muted); margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.hist-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
.hist-time { font-size: 10px; color: var(--text-muted); }
.hist-chip {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; padding: 1px 7px; border-radius: 9px;
  background: var(--bg-selected);
  border: 1px solid color-mix(in srgb, var(--accent-blue) 30%, transparent);
  color: var(--accent-blue); white-space: nowrap;
}
.hist-empty {
  font-size: 11.5px; color: var(--text-muted);
  padding: 10px 2px;
}
</style>
</head>
<body>
<div class="panel">
  <div class="panel-header">
    <span class="ph-icon" style="color:#a78bfa"><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M12 2l1.9 6.1L20 10l-6.1 1.9L12 18l-1.9-6.1L4 10l6.1-1.9z"/></svg></span>
    <span class="ph-title" id="panel-title">AI 助手</span>
    <span class="badge-beta">BETA</span>
    <button class="ph-act-btn" id="history-btn" onclick="onHistoryBtn()">历史</button>
    <button class="ph-act-btn" id="new-chat-btn" onclick="newChat()">新对话</button>
  </div>

  <div class="panel-body">
    <div class="chat-view" id="chat-view">
      <div class="scenario-banner" id="scenario-banner" style="display:none">
        <span id="scenario-banner-text"></span>
        <button onclick="reopenScenarioView()">分屏查看 ↗</button>
      </div>

      <div class="chat-messages" id="chat-log"></div>

      <div class="suggestions">
        <button class="sug-btn" onclick="fillInput('帮我检查开发环境，配置检测失败')">检查开发环境</button>
        <button class="sug-btn" onclick="fillInput('现在有哪些 BMC 在线？')">哪些 BMC 在线</button>
        <button class="sug-btn" onclick="fillInput('给 CPU0 加一个过温事件，阈值 85 度')">加过温事件</button>
        <button class="sug-btn" onclick="fillInput('func=0x0B cmd=0x120 读操作，算 SMC 偏移量')">算 SMC 偏移量</button>
      </div>

      <div class="chat-input-area">
        <textarea class="chat-input" id="chat-input"
          placeholder="描述你的问题，Enter 发送，Shift+Enter 换行…"
          onkeydown="handleKey(event)"></textarea>
        <button class="chat-send" id="send-btn" onclick="sendMsg()">↑</button>
      </div>
    </div>

    <div class="history-view" id="history-view">
      <div class="hv-section-title">示例场景</div>
      <div id="scenario-list" style="display:flex;flex-direction:column;gap:6px"></div>
      <div class="hv-section-title">我的会话</div>
      <div id="session-list" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>
  </div>
</div>

<script>
const INIT = '你好！我是 openUBMC Studio 助手。\n点击右上角「历史」查看示例场景会话——点开任意一条，会自动分屏打开对应的功能视图。';
let thinking = false;

// ── 单色 SVG 图标（不使用 emoji） ──────────────────────────────
const ICON_PATHS = {
  server: '<rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/><path d="M7 7h.01M7 17h.01"/>',
  link:   '<path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.5-1.5"/>',

function ICON(name, size) {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" '
    + 'stroke-linecap="round" stroke-linejoin="round" width="' + (size || 16) + '" height="' + (size || 16) + '">'

}

// ── 示例场景会话（对应 MCP 工具驱动的典型工作流） ──────────────
const VIEW_LABELS = {
  bmcEnv: 'BMC 环境管理', event: '事件配置', sensor: '传感器配置',
  topology: '拓扑视图', smcExt: 'SMC 偏移量', pipeExpr: '管道表达式',
  explorer: '资源管理器', threeD: '3D 仿真', simulator: '仿真调试',
  coolingConfig: '能效调速配置', installGuide: '安装引导',

function respond(q) {
  const s = q.toLowerCase();
  for (const [keys, reply] of RULES) {
    if (keys.some(k => s.includes(k))) return reply;
  }
  return '抱歉，我暂时无法理解这个问题。可以问我关于 BMC 连接管理、快捷命令、CSR 拓扑、传感器配置等话题。';
}

// ── 会话状态与持久化 ─────────────────────────────────────────
const STORE_KEY = 'bmcAiChatSessions';
let currentScenario = null;              // 当前载入的示例场景
let session = freshSession();            // 当前会话（有新用户消息才会入库）

function freshSession(seedMessages) {
  return { id: 'ss-' + Math.random().toString(36).slice(2, 9), title: null,
           time: Date.now(), messages: seedMessages ? seedMessages.slice() : [], hasNew: false };
}

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}

function persistSession() {
  if (!session.hasNew) return;
  const list = loadSessions().filter(s => s.id !== session.id);
  list.unshift({ id: session.id, title: session.title, time: session.time, messages: session.messages });
  localStorage.setItem(STORE_KEY, JSON.stringify(list.slice(0, 20)));
}

function fmtTime(ts) {
  const d = Date.now() - ts;
  if (d < 60e3) return '刚刚';
  if (d < 3600e3) return Math.floor(d / 60e3) + ' 分钟前';
  if (d < 86400e3) return Math.floor(d / 3600e3) + ' 小时前';
  return Math.floor(d / 86400e3) + ' 天前';
}

// ── 渲染 ─────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderText(text) {
  // 支持 ```代码块```、`行内代码`、换行
  const parts = text.split(/```/);
  return parts.map((part, i) => {
    if (i % 2 === 1) return '<pre>' + escapeHtml(part.replace(/^\n|\n$/g, '')) + '</pre>';
    return escapeHtml(part)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }).join('');
}

function appendMsg(role, text, tools) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  const av = document.createElement('div');
  av.className = 'cm-avatar';
  av.textContent = role === 'ai' ? 'AI' : 'ME';
  const bub = document.createElement('div');
  bub.className = 'cm-bubble';
  let html = '';
  if (tools && tools.length) {
    html += '<div class="tool-calls">' +
      tools.map(t => '<span class="tool-chip"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0"><path d="M8 6l6 6-6 6"/></svg>' + escapeHtml(t) + '</span>').join('') +
      '</div>';
  }
  html += renderText(text);
  bub.innerHTML = html;
  div.appendChild(av); div.appendChild(bub);
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function appendNote(text) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'sys-note';
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function showTyping() {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'chat-msg ai'; div.id = 'typing';
  div.innerHTML = '<div class="cm-avatar">AI</div><div class="cm-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  log.appendChild(div); log.scrollTop = log.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ── 历史视图 ─────────────────────────────────────────────────
function histItem({ icon, title, preview, time, viewLabel }, onClick) {
  const div = document.createElement('div');
  div.className = 'hist-item';
  div.innerHTML =
    '<div class="hist-icon">' + ICON(icon) + '</div>' +
    '<div class="hist-main">' +
      '<div class="hist-title">' + escapeHtml(title) + '</div>' +
      '<div class="hist-preview">' + escapeHtml(preview) + '</div>' +
      '<div class="hist-meta">' +
        '<span class="hist-time">' + escapeHtml(time) + '</span>' +
        (viewLabel ? '<span class="hist-chip">↗ ' + escapeHtml(viewLabel) + '</span>' : '') +
      '</div>' +
    '</div>';
  div.onclick = onClick;
  return div;
}

function renderHistory() {
  const scList = document.getElementById('scenario-list');
  scList.innerHTML = '';
  for (const sc of SCENARIOS) {
    scList.appendChild(histItem({
      icon: sc.icon, title: sc.title,
      preview: sc.messages[0].text, time: sc.time,
      viewLabel: VIEW_LABELS[sc.view],
    }, () => loadScenario(sc)));
  }

  const ssList = document.getElementById('session-list');
  ssList.innerHTML = '';
  const sessions = loadSessions();
  if (!sessions.length) {
    const empty = document.createElement('div');
    empty.className = 'hist-empty';
    empty.textContent = '暂无会话记录——发送一条消息后会自动保存到这里。';
    ssList.appendChild(empty);
  } else {
    for (const ss of sessions) {
      ssList.appendChild(histItem({
        icon: 'chat', title: ss.title || '未命名会话',
        preview: (ss.messages.find(m => m.role === 'user') || ss.messages[0] || { text: '' }).text,
        time: fmtTime(ss.time),
        viewLabel: null,
      }, () => loadSession(ss)));
    }
  }
}

function toggleHistory(force) {
  const show = force !== undefined ? force : !document.body.classList.contains('show-history');
  if (show) renderHistory();
  document.body.classList.toggle('show-history', show);
  document.getElementById('history-btn').classList.toggle('is-active', show);
  document.getElementById('history-btn').textContent = show ? '收起历史' : '历史';
}

// ── 载入历史 / 场景 ──────────────────────────────────────────
function setChatLog(messages, note) {
  const log = document.getElementById('chat-log');
  log.innerHTML = '';
  if (note) appendNote(note);
  for (const m of messages) appendMsg(m.role, m.text, m.tools);
}

function openScenarioView(viewId) {
  window.parent.postMessage({ type: 'ai-open-scenario', viewId }, '*');
}

function loadScenario(sc) {
  persistSession();
  currentScenario = sc;
  session = freshSession(sc.messages);
  session.title = sc.title + '（续）';
  setChatLog(sc.messages, '已载入示例场景 · ' + sc.title);
  const banner = document.getElementById('scenario-banner');
  banner.style.display = 'flex';
  document.getElementById('scenario-banner-text').innerHTML =
    '关联视图：<b>' + escapeHtml(VIEW_LABELS[sc.view] || sc.view) + '</b>';
  // 历史保持在左侧展开，对话在右侧刷新（左右并排，不收起）
  openScenarioView(sc.view);
}

function loadSession(ss) {
  persistSession();
  currentScenario = null;
  session = { id: ss.id, title: ss.title, time: ss.time, messages: ss.messages.slice(), hasNew: false };
  setChatLog(ss.messages, '已载入历史会话');
  document.getElementById('scenario-banner').style.display = 'none';
  // 历史保持在左侧展开，对话在右侧刷新（左右并排，不收起）
}

function reopenScenarioView() {
  if (currentScenario) openScenarioView(currentScenario.view);
}

// ── 会话操作 ─────────────────────────────────────────────────
function newChat() {
  persistSession();
  currentScenario = null;
  session = freshSession();
  document.getElementById('scenario-banner').style.display = 'none';
  setChatLog([], null);
  appendMsg('ai', INIT);
  toggleHistory(false);
}

function fillInput(text) {
  const el = document.getElementById('chat-input');
  el.value = text; el.focus();
}

function recordMsg(role, text) {
  session.messages.push({ role, text });
  if (role === 'user') {
    session.hasNew = true;
    if (!session.title) session.title = text.length > 18 ? text.slice(0, 18) + '…' : text;
  }
  persistSession();
}

function sendMsg() {
  if (thinking) return;
  const el = document.getElementById('chat-input');
  const text = el.value.trim();
  if (!text) return;
  el.value = '';
  appendMsg('user', text);
  recordMsg('user', text);
  thinking = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  setTimeout(() => {
    hideTyping();
    const reply = respond(text);
    appendMsg('ai', reply);
    recordMsg('ai', reply);
    thinking = false;
    document.getElementById('send-btn').disabled = false;
  }, 600 + Math.random() * 500);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

// ── 初始化 ───────────────────────────────────────────────────
const IS_HISTORY_TAB = new URLSearchParams(location.search).get('view') === 'history';

function onHistoryBtn() {
  if (IS_HISTORY_TAB) return;
  // 在 AI 助手侧面板内就地展开历史（同一卡片切换列表↔对话），不再单开一个 tab
  toggleHistory();
}

if (IS_HISTORY_TAB) {
  document.body.classList.add('history-tab-mode', 'show-history');
  document.getElementById('panel-title').textContent = 'AI 历史';
  renderHistory();
} else {
  appendMsg('ai', INIT);
}
window.addEventListener('beforeunload', persistSession);
</script>
